name: CI

on:
  push:
    branches:
      - main
      - feat-foundation-and-project-setup
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      RUN_DATABASE_INTEGRATION: 'true'
      DATABASE_URL: postgresql://postgres:mailmind_test_password@127.0.0.1:5432/mailmind_stage2_test
      DIRECT_URL: postgresql://postgres:mailmind_test_password@127.0.0.1:5432/mailmind_stage2_test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: mailmind_test_password
          POSTGRES_DB: mailmind_stage2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mailmind_stage2_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare authentication test database
        run: |
          docker exec ${{ job.services.postgres.id }} psql -U postgres -d mailmind_stage2_test -v ON_ERROR_STOP=1 -c "create schema extensions; create role anon; create role authenticated; create role service_role;"
          docker cp supabase/migrations/20260720022901_create_app_auth_schema.sql ${{ job.services.postgres.id }}:/tmp/mailmind-schema.sql
          docker exec ${{ job.services.postgres.id }} psql -U postgres -d mailmind_stage2_test -v ON_ERROR_STOP=1 -f /tmp/mailmind-schema.sql

      - name: Validate Prisma schema
        run: npm run prisma:validate --workspace @mailmind/api

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace @mailmind/api

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test backend
        run: npm test --workspace @mailmind/api

      - name: Build
        run: npm run build
